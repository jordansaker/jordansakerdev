services:
  db:
    image: postgres:16-alpine
    container_name: studio-dashboard-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: studio
      POSTGRES_PASSWORD: studio
      POSTGRES_DB: studio
    ports:
      - "5433:5432"
    volumes:
      - studio-db-data:/var/lib/postgresql/data

volumes:
  studio-db-data:
